# =============================================================================
# configs/domains/legal.yaml
#
# Legal domain configuration.
# Inherits global defaults from configs/global_config.yaml and overrides below.
# =============================================================================

domain_id: legal
name: Legal
description: "Contracts, compliance documents, regulatory guidelines, and legal policies"

vectorstore:
  provider: chromadb
  collection_name: legal
  persist_directory: ./data/chromadb/legal

# Larger chunks to preserve legal clause context
chunking:
  strategy: recursive
  recursive:
    chunk_size: 800
    overlap: 100

embeddings:
  provider: sentence_transformers
  model_name: all-mpnet-base-v2   # 768-dim, higher quality for legal text
  device: cpu
  batch_size: 16

retrieval:
  strategies:
    - hybrid
  top_k: 8
  similarity: cosine
  hybrid:
    alpha: 0.65     # Balanced: legal requires both semantic + exact term matching
    normalize_scores: true

# LLM — higher quality model for legal precision
llm:
  provider: gemini
  model_name: gemini-1.5-pro
  temperature: 0.1
  max_tokens: 1024         # Legal answers may be longer

security:
  allowed_file_types:
    - pdf
    - docx
    - txt
  max_file_size_mb: 30     # Legal docs can be large

metadata:
  track_versions: true
  enable_deprecation: true
  compute_file_hash: true
  extract_page_numbers: true
  required_fields:
    - doc_id
    - title
    - domain
    - doc_type
    - uploader_id
